name: CICD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: 'eu-north-1'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: 'true'

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          REPOSITORY: inova-order_service  # ✅ Fixed: Changed to order_service
        run: |
          docker build -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Create task definition (without logs)
        run: |
          cat > task-definition.json << 'EOF'
          {
            "family": "inova-orderservice-class-definition",
            "taskRoleArn": "arn:aws:iam::749621714427:role/service-role/ecsTaskExecutionRole",
            "executionRoleArn": "arn:aws:iam::749621714427:role/service-role/ecsTaskExecutionRole",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "1024",
            "memory": "3072",
            "runtimePlatform": {
              "cpuArchitecture": "X86_64",
              "operatingSystemFamily": "LINUX"
            },
            "containerDefinitions": [
              {
                "name": "inova-order_service",
                "image": "${{ steps.build-image.outputs.image }}",
                "portMappings": [
                  {
                    "containerPort": 3002,
                    "protocol": "tcp"
                  }
                ],
                "essential": true,
                "environment": [
                  {
                    "name": "PORT",
                    "value": "3002"
                  },
                  {
                    "name": "MONGODB_URI",
                    "value": "${{ secrets.INOVA_MONGO_DB }}"
                  }
                ]
              }
            ]
          }
          EOF

      - name: Register task definition
        id: register-task
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task-definition-arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster default \
            --service inova-orderservice-class-definition-service-awzzic7u \
            --task-definition ${{ steps.register-task.outputs.task-definition-arn }} \
            --force-new-deployment \
            --region eu-north-1

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster default \
            --services inova-orderservice-class-definition-service-awzzic7u \
            --region eu-north-1 || true

      - name: Get deployment info
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster default \
            --service-name inova-orderservice-class-definition-service-awzzic7u \
            --query "taskArns[0]" \
            --output text)
          
          if [ "$TASK_ARN" != "None" ] && [ -n "$TASK_ARN" ]; then
            PUBLIC_IP=$(aws ecs describe-tasks \
              --cluster default \
              --tasks $TASK_ARN \
              --query "tasks[0].attachments[0].details[?name=='publicIPv4Address'].value" \
              --output text)
            
            echo "✅ Order Service deployed!"
            echo "📍 URL: http://$PUBLIC_IP:3002"
          else
            echo "⚠️  Check service status in AWS Console"
          fi